<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluctus — Factuur & onderhandelingsmarge</title>
<style>
  :root{ --blauw:#1F3864; --groen:#05B050; --groen-d:#048443; --grijs:#5A6577; --lijn:#D5DBE3;
         --bg:#F5F7FA; --zwart:#1A1F2B; --rood:#C0392B; --factuurbg:#FAFBFD; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--zwart);background:#e9edf2;font-size:14px;line-height:1.5}
  .a4{background:#fff;width:210mm;min-height:297mm;margin:14px auto;padding:18mm 16mm 12mm;box-shadow:0 2px 14px rgba(0,0,0,.12);display:flex;flex-direction:column}
  .a4-foot{margin-top:auto;padding-top:6px;font-size:9px;color:var(--grijs);border-top:1px solid var(--lijn);display:flex;justify-content:space-between}
  .eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grijs);font-weight:700}
  h1{font-size:30px;color:var(--blauw);line-height:1.1;margin:6px 0 10px;font-weight:800}
  h2{font-size:20px;color:var(--blauw);margin:0 0 4px;font-weight:800}
  h3{font-size:14px;color:var(--blauw);margin:16px 0 8px;font-weight:700}
  .lead{font-size:15px;color:var(--grijs);margin-bottom:14px}
  p{margin:8px 0}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}
  .kpi{border:1px solid var(--lijn);border-left:4px solid var(--blauw);border-radius:4px;padding:12px}
  .kpi.groen{border-left-color:var(--groen)}
  .kpi .l{font-size:10px;color:var(--grijs);text-transform:uppercase;letter-spacing:.05em}
  .kpi .v{font-size:24px;font-weight:800;margin-top:3px}
  .kpi .s{font-size:10px;color:var(--grijs);margin-top:2px}

  /* ---- FACTUUR-KADER: lichte achtergrond, dunne afgeronde kader, schaduw rechtsonder ---- */
  .factuur-kader{background:var(--factuurbg);border:1px solid var(--lijn);border-radius:10px;
    box-shadow:5px 6px 14px rgba(31,56,100,.10);padding:0;margin:14px 0;overflow:hidden}
  .factuur-kader.vgl{padding:0}
  .fk-titel{background:var(--blauw);color:#fff;padding:9px 16px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .fk-titel .badge{font-size:10px;background:#ffffff22;padding:2px 8px;border-radius:3px;font-weight:600}
  .fk-body{padding:14px 16px}
  .fk-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px;font-size:11px;color:var(--grijs);margin-bottom:12px;border-bottom:1px dashed var(--lijn);padding-bottom:10px}
  .fk-meta b{color:var(--zwart);font-weight:600}
  table.factuur{width:100%;border-collapse:collapse;font-size:12px}
  table.factuur td{padding:5px 4px;border-bottom:1px solid #eceff4}
  table.factuur td:last-child{text-align:right;font-variant-numeric:tabular-nums}
  table.factuur .groep td{font-weight:700;color:var(--blauw);padding-top:10px;border-bottom:1px solid var(--lijn)}
  table.factuur .sub td{padding-left:16px;color:var(--grijs)}
  table.factuur .totaal td{font-weight:800;font-size:14px;border-top:2px solid var(--blauw);border-bottom:none;padding-top:8px}
  table.factuur .btw td{color:var(--grijs)}

  /* vergelijking: twee kolommen */
  .vgl-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .vgl-grid > div{padding:14px 16px}
  .vgl-grid > div:first-child{border-right:1px solid var(--lijn)}
  .vgl-kop{font-weight:800;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .vgl-kop .bedrag{font-size:16px;color:var(--blauw)}
  .vgl-kop.beter .bedrag{color:var(--groen-d)}
  table.vgl{width:100%;border-collapse:collapse;font-size:11.5px}
  table.vgl td{padding:4px 2px;border-bottom:1px solid #eceff4}
  table.vgl td:last-child{text-align:right;font-variant-numeric:tabular-nums}
  table.vgl .grp td{font-weight:700;color:var(--blauw);padding-top:8px}
  table.vgl .tot td{font-weight:800;border-top:2px solid var(--blauw);padding-top:6px}

  .box{border:1px solid var(--lijn);border-radius:6px;padding:14px;margin:12px 0;background:var(--bg)}
  .box.groen{background:#05B0500f;border-color:#05B05040}
  .note{font-size:11px;color:var(--grijs);font-style:italic}
  .pos{color:var(--groen-d);font-weight:700}
  .neg{color:var(--rood);font-weight:700}
  .scan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 20px;font-size:12px}
  .scan-grid .rij{display:flex;justify-content:space-between;border-bottom:1px dotted var(--lijn);padding:4px 0}
  .scan-grid .rij .lbl{color:var(--grijs)}
  .scan-grid .rij .val{font-weight:600;text-align:right}
  @page{size:A4;margin:0}
  @media print{body{background:#fff}.a4{box-shadow:none;margin:0;min-height:297mm;page-break-after:always;break-after:page}.a4:last-child{page-break-after:auto;break-after:auto}table,.factuur-kader,.box{break-inside:avoid}}
  @media (max-width:800px){.a4{width:100%;padding:14px}.vgl-grid{grid-template-columns:1fr}.vgl-grid>div:first-child{border-right:none;border-bottom:1px solid var(--lijn)}.scan-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="rapport"></div>
<script>
// =============================================================================
//  FLUCTUS — FACTUUR- & ONDERHANDELINGSMARGE-RAPPORT
//  Eerste rapport, meteen na de factuurscan + profielkeuze. Vergelijkt vier
//  facturen: maand (bestaand vs scherp dynamisch) en jaar (geëxtrapoleerd).
//  Gevoed via window.FLUCTUS_FACTUURRAPPORT_DATA; anders het VOORBEELD hieronder.
// =============================================================================
function _laadRapportData(){
  if(window.FLUCTUS_FACTUURRAPPORT_DATA) return window.FLUCTUS_FACTUURRAPPORT_DATA;
  try{ var s=sessionStorage.getItem('FLUCTUS_FACTUURRAPPORT'); if(s) return JSON.parse(s); }catch(e){}
  return null;
}
var D = _laadRapportData() || {
  klant:'Voorbeeld NV', locatie:'9220 Wetteren', datum:'juli 2026',
  leverancier:'Huidige leverancier', ean:'541448000000000000',
  periode_van:'01/04/2026', periode_tot:'30/04/2026', periode_dagen:30,
  // ALLE gescande data (ter verificatie — de lezer hoeft de originele factuur niet terug te zoeken)
  scan:{
    'Factuurnummer':'2026/04-00123', 'Klant / BTW':'Voorbeeld NV · BE 0123.456.789',
    'Leveringsadres':'Industrieweg 12, 9220 Wetteren', 'EAN afname':'541448000000000000',
    'Netbeheerder':'Fluvius Midden-Vlaanderen', 'Spanningsniveau':'Middenspanning (MS)',
    'Aansluitvermogen':'250 kVA', 'Meterregime':'Kwartuurmeting (AMR)',
    'Factuurperiode':'01/04/2026 – 30/04/2026 (30 dagen)',
    'Afname (kWh)':'13.667', 'Injectie (kWh)':'0',
    'Maandpiek afname':'182 kW', 'Contracttype':'Vaste prijs',
    'Energieprijs':'110,4 €/MWh', 'Capaciteitstarief':'57,4 €/kW/jaar'
  },
  // MAAND-facturen (bedragen excl. btw); btw_pct voor de incl.-lijn
  btw_pct:21,
  maand:{
    bestaand:{ label:'Huidig contract', posten:[
      {grp:'Energie (commodity)', items:[['Afname energie',1509],['Vaste kost leverancier',15]]},
      {grp:'Netkosten (distributie + transport)', items:[['Capaciteit / maandpiek',1291],['Proportioneel + databeheer',280]]},
      {grp:'Heffingen + accijnzen', items:[['Bijdragen & accijnzen',1305]]}
    ], subtotaal:4400 },
    dynamisch:{ label:'Scherp dynamisch contract', posten:[
      {grp:'Energie (commodity)', items:[['Afname energie (spot passthrough)',1180],['Vaste kost leverancier',12]]},
      {grp:'Netkosten (distributie + transport)', items:[['Capaciteit / maandpiek',1291],['Proportioneel + databeheer',280]]},
      {grp:'Heffingen + accijnzen', items:[['Bijdragen & accijnzen',1305]]}
    ], subtotaal:4068 }
  },
  // Jaar-extrapolatie (uit de maandfactuur, gecorrigeerd voor seizoensprofiel)
  extrapolatie_factor:12.0,
  jaar:{
    bestaand:{ label:'Huidig contract — jaar', subtotaal:52800 },
    dynamisch:{ label:'Scherp dynamisch — jaar', subtotaal:48800 }
  }
};

var fmt=new Intl.NumberFormat('nl-BE',{maximumFractionDigits:0});
function eur(v){ return '€ '+fmt.format(Math.round(v)); }
function eur2(v){ return '€ '+new Intl.NumberFormat('nl-BE',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v); }
function el(t,a,h){var e=document.createElement(t);if(a)for(var k in a){k==='class'?e.className=a[k]:e.setAttribute(k,a[k]);}if(h!=null)e.innerHTML=h;return e;}

var R=document.getElementById('rapport');
function pagina(nr, inner){
  var p=el('div',{class:'a4'});
  p.innerHTML=inner+'<div class="a4-foot"><span>Fluctus.net CVSO · BE 0757.494.180 · Onafhankelijk energieadvies</span><span>p. '+nr+'</span></div>';
  R.appendChild(p);
}

// Render één factuur als "echte factuur" (kader-body)
function factuurBody(fac, btw_pct){
  var body='<table class="factuur">';
  var sub=0;
  fac.posten.forEach(function(g){
    body+='<tr class="groep"><td>'+g.grp+'</td><td></td></tr>';
    g.items.forEach(function(it){ body+='<tr class="sub"><td>'+it[0]+'</td><td>'+eur2(it[1])+'</td></tr>'; sub+=it[1]; });
  });
  var btw=sub*btw_pct/100;
  body+='<tr class="totaal"><td>Subtotaal (excl. btw)</td><td>'+eur2(sub)+'</td></tr>';
  body+='<tr class="btw"><td>Btw '+btw_pct+'%</td><td>'+eur2(btw)+'</td></tr>';
  body+='<tr class="totaal"><td>Totaal (incl. btw)</td><td>'+eur2(sub+btw)+'</td></tr>';
  body+='</table>';
  return body;
}

// ---- Berekende cijfers ----
var marge_maand = D.maand.bestaand.subtotaal - D.maand.dynamisch.subtotaal;
var marge_jaar = D.jaar.bestaand.subtotaal - D.jaar.dynamisch.subtotaal;
var marge_pct = D.jaar.bestaand.subtotaal>0 ? marge_jaar/D.jaar.bestaand.subtotaal*100 : 0;

// ==================== PAGINA 1 — TITEL + SAMENVATTING ====================
pagina(1, `
  <div class="eyebrow">Factuuranalyse · vertrouwelijk</div>
  <h1>Wat is uw onderhandelingsmarge?</h1>
  <p class="lead">Analyse van uw ${D.leverancier==''?'huidige':D.leverancier+'-'}factuur — ${D.klant}, ${D.locatie} · ${D.datum}</p>
  <p>We lazen uw factuur in en simuleerden exact hetzelfde verbruik (en injectie) op een <b>scherp geprijsd dynamisch contract</b>. Het verschil is de marge die u vandaag laat liggen — én uw onderhandelingsruimte bij uw huidige leverancier.</p>
  <div class="kpi-row">
    <div class="kpi groen"><div class="l">Marge / jaar</div><div class="v" style="color:var(--groen-d)">${eur(marge_jaar)}</div><div class="s">−${new Intl.NumberFormat('nl-BE',{maximumFractionDigits:1}).format(marge_pct)}% op uw factuur</div></div>
    <div class="kpi"><div class="l">Marge / maand</div><div class="v">${eur(marge_maand)}</div><div class="s">op deze factuurperiode</div></div>
    <div class="kpi"><div class="l">Zelfde verbruik</div><div class="v">${D.scan['Afname (kWh)']||'—'}</div><div class="s">kWh — enkel het contract verschilt</div></div>
  </div>
  <div class="box groen"><b>Enkel door slimmer te contracteren</b> — zonder één kWh anders te verbruiken — bespaart u naar schatting <b>${eur(marge_jaar)}/jaar</b>. Op de volgende pagina leest u hoe u dat gesprek best inzet; daarna ziet u de facturen tot in detail, zodat u alles kunt verifiëren.</div>
  <p class="note">Alle bedragen excl. btw tenzij anders vermeld, B2B. De jaarcijfers zijn een extrapolatie van uw maandfactuur, gecorrigeerd voor het seizoensprofiel. Dit rapport bevat alle data uit uw factuurscan — u hoeft de originele factuur niet terug te zoeken.</p>
`);

// ==================== PAGINA 2 — ONDERHANDELING: TIPS + RELATIE ====================
pagina(2, `
  <div class="eyebrow">Onderhandeling</div>
  <h2>Zo zet u het gesprek in met uw leverancier</h2>
  <p class="lead">Gebruik de marge van ${eur(marge_jaar)}/jaar als vertrekpunt — niet als breekijzer.</p>

  <h3>Tips om het gesprek in te zetten</h3>
  <ul style="margin:6px 0 10px 18px;font-size:13px;line-height:1.6">
    <li>Vraag een <b>dynamisch tarief</b> met een <b>transparante, aparte marge</b> (€/MWh) — geen ondoorzichtig "alles-in".</li>
    <li>Vergelijk altijd op de <b>all-in €/MWh</b>, niet enkel de kale commodity — en houd vaste kosten apart in het oog.</li>
    <li>Gebruik de marge uit dit rapport (<b>${eur(marge_jaar)}/jaar</b>) als <b>ankerpunt</b>, niet als eindpunt.</li>
    <li>Vraag expliciet naar hun mogelijkheden om <b>samen op intraday en onbalans</b> te werken met uw batterij en laadinfrastructuur.</li>
    <li>Laat zien dat u een <b>actieve, sturende verbruiker</b> wordt — dat is voor een goede leverancier veel waard.</li>
  </ul>

  <div class="box" style="background:#FFF3E0;border-color:#9E480E55">
    <b>Belangrijk — onderhandel niet tot op het bot.</b> Uw relatie met uw leverancier is óók een belangrijke relatie. Straks vertrouwt u op hem om met uw energie-infrastructuur op allerlei markten (intraday, onbalans) aan de slag te gaan — samen extra waarde te organiseren. Het heeft dus geen zin om alles uit te knijpen. Veel belangrijker is dat uw leverancier beseft dat u een <b>actieve en betrokken gebruiker</b> bent. Goede leveranciers hebben die het liefst — en dat brengt jullie straks samen veel verder dan een paar euro extra korting vandaag.
  </div>

  <div class="box" style="background:#1F386408;border-color:#1F386430">
    <b>Vast of dynamisch? Een bewuste keuze.</b> Dynamisch is niet automatisch "beter". U kunt bewust kiezen voor (deels) <b>vaste prijzen</b> — al dan niet met klikmomenten — omdat prijszekerheid beter past bij uw bedrijfsvoering. Dat is een legitieme keuze. Wat deze analyse u geeft, is <b>inzicht in de reële risicopremie</b> die u voor die zekerheid betaalt: het verschil tussen uw vaste tarief en de dynamische marktprijs. Met dat inzicht kunt u een geïnformeerd gesprek voeren met uw leverancier over de <b>hoogte</b> van die premie — en zelf bepalen hoeveel zekerheid u ze waard vindt.
  </div>
`);

// ==================== PAGINA 3 — GESCANDE DATA (VERIFICATIE) ====================
var scanRows='';
for(var k in D.scan){ scanRows+='<div class="rij"><span class="lbl">'+k+'</span><span class="val">'+D.scan[k]+'</span></div>'; }
pagina(3, `
  <div class="eyebrow">Verificatie</div>
  <h2>Gegevens uit uw factuur</h2>
  <p class="lead">Alles wat we uit uw ingeladen factuur hebben gelezen — controleer gerust.</p>
  <div class="factuur-kader">
    <div class="fk-titel"><span>Ingelezen factuurgegevens</span><span class="badge">📎 uit scan</span></div>
    <div class="fk-body"><div class="scan-grid">${scanRows}</div></div>
  </div>
  <p class="note">Klopt er iets niet? Meld het uw adviseur — de simulatie en deze analyse worden dan opnieuw met de correcte waarden gedraaid.</p>
`);

// ==================== PAGINA 4 — MAANDFACTUREN DETAIL (2 KOLOMMEN) ====================
pagina(4, `
  <div class="eyebrow">Factuurdetail — deze maand</div>
  <h2>Uw maandfactuur, twee contracten naast elkaar</h2>
  <p class="lead">Dezelfde maand (${D.periode_van} – ${D.periode_tot}), hetzelfde verbruik — enkel het contract verschilt.</p>
  <div class="factuur-kader vgl">
    <div class="fk-titel"><span>Maandfactuur — ${D.periode_van} – ${D.periode_tot}</span><span class="badge">excl. btw = subtotaal</span></div>
    <div class="vgl-grid">
      <div><div class="vgl-kop"><span>${D.maand.bestaand.label}</span><span class="bedrag">${eur(D.maand.bestaand.subtotaal)}</span></div>${factuurBody(D.maand.bestaand, D.btw_pct)}</div>
      <div><div class="vgl-kop beter"><span>${D.maand.dynamisch.label}</span><span class="bedrag">${eur(D.maand.dynamisch.subtotaal)}</span></div>${factuurBody(D.maand.dynamisch, D.btw_pct)}</div>
    </div>
  </div>
  <div class="box groen"><b>Verschil deze maand: ${eur(marge_maand)}</b> goedkoper op een scherp dynamisch contract. De netkosten en heffingen blijven gelijk (die hangen niet van uw leverancier af); het verschil zit volledig in de <b>energiecomponent</b>.</div>
`);

// ==================== PAGINA 5 — JAARFACTUREN (EXTRAPOLATIE) ====================
function jaarKolom(fac, maandFac, beter){
  var factor=D.extrapolatie_factor;
  var body='<table class="vgl">';
  maandFac.posten.forEach(function(g){
    body+='<tr class="grp"><td>'+g.grp+'</td><td></td></tr>';
    g.items.forEach(function(it){ body+='<tr><td>'+it[0]+'</td><td>'+eur(it[1]*factor)+'</td></tr>'; });
  });
  body+='<tr class="tot"><td>Subtotaal / jaar (excl. btw)</td><td>'+eur(fac.subtotaal)+'</td></tr>';
  body+='</table>';
  return '<div class="vgl-kop'+(beter?' beter':'')+'"><span>'+fac.label+'</span><span class="bedrag">'+eur(fac.subtotaal)+'</span></div>'+body;
}
pagina(5, `
  <div class="eyebrow">Factuurdetail — jaar</div>
  <h2>Geëxtrapoleerd naar een volledig jaar</h2>
  <p class="lead">Dezelfde twee contracten, nu over 12 maanden — zo ziet u de jaarlijkse impact.</p>
  <div class="factuur-kader vgl">
    <div class="fk-titel"><span>Jaarfactuur — extrapolatie (×${new Intl.NumberFormat('nl-BE',{maximumFractionDigits:1}).format(D.extrapolatie_factor)}, seizoensgecorrigeerd)</span><span class="badge">excl. btw</span></div>
    <div class="vgl-grid">
      <div>${jaarKolom(D.jaar.bestaand, D.maand.bestaand, false)}</div>
      <div>${jaarKolom(D.jaar.dynamisch, D.maand.dynamisch, true)}</div>
    </div>
  </div>
  <div class="box groen"><b>Onderhandelingsmarge: ${eur(marge_jaar)}/jaar</b> (−${new Intl.NumberFormat('nl-BE',{maximumFractionDigits:1}).format(marge_pct)}%). Gebruik dit cijfer om samen met uw leverancier een <b>beter contract</b> te vinden — bij een partner waar u zich goed bij voelt. En dit is nog vóór PV, batterij of slimme sturing: die komen in het uitgebreide ontwerprapport.</div>
  <p class="note">Extrapolatie op basis van uw maandfactuur × seizoensprofiel. De vier facturen (maand bestaand/dynamisch, jaar bestaand/dynamisch) dragen een vaste benaming die in het uitgebreide rapport terugkomt.</p>
`);

// ==================== PAGINA 6 — 12-MAAND HEATMAP (factuursimulatie) ====================
(function(){
  var pr=D.factuurSimProfielen;
  var vals=pr && (pr.kost_eur_mwh || pr.spot_prijs_eur_mwh);
  if(!pr || !Array.isArray(vals) || vals.length<96) return;
  var bron = pr.kost_eur_mwh ? 'all-in energiekost (€/MWh)' : 'spotprijs (€/MWh)';
  pagina(6, `
    <div class="eyebrow">Factuursimulatie · dynamisch tarief</div>
    <h2>Uw verbruik × de spotprijzen — 12 maanden</h2>
    <p class="lead">Elke kolom is een dag, elke rij een uur van de dag. De kleur toont de ${bron} die u op een dynamisch tarief zou betalen — zo ziet u wanneer energie duur (rood) en goedkoop (blauw) was.</p>
    <div style="text-align:center;margin:12px 0"><canvas id="fs-heat" width="720" height="240" style="max-width:100%;border:1px solid var(--lijn);border-radius:6px"></canvas></div>
    <div id="fs-heat-legend" style="display:flex;align-items:center;gap:8px;justify-content:center;font-size:11px;color:var(--grijs)"></div>
    <p class="note">Berekend op uw gekozen verbruiksprofiel × de werkelijke day-ahead spotprijzen (marktdata). Dit is de basis van de energiepost in de dynamische factuur op de vorige pagina's — geen schatting, maar een echte simulatie.</p>
  `);
  setTimeout(function(){ tekenFactuurHeat(vals); }, 30);
})();
function tekenFactuurHeat(vals){
  var cv=document.getElementById('fs-heat'); if(!cv) return;
  var ctx=cv.getContext('2d'), W=cv.width, H=cv.height, perDag=96;
  var dagen=Math.floor(vals.length/perDag), uren=24, grid=[], mn=1e9, mx=-1e9;
  for(var d=0; d<dagen; d++){ grid[d]=[]; for(var u=0; u<uren; u++){ var s=0,c=0; for(var q=0;q<4;q++){ var idx=d*perDag+u*4+q; if(idx<vals.length){ s+=vals[idx]; c++; } } var v=c?s/c:0; grid[d][u]=v; if(v<mn)mn=v; if(v>mx)mx=v; } }
  var cw=W/dagen, ch=H/uren;
  function kleur(t){ t=Math.max(0,Math.min(1,t)); var r,g,b; if(t<0.5){ var k=t/0.5; r=Math.round(30+k*225); g=Math.round(90+k*165); b=Math.round(200-k*160); } else { var k2=(t-0.5)/0.5; r=255; g=Math.round(255-k2*200); b=Math.round(40-k2*40); } return 'rgb('+r+','+g+','+b+')'; }
  for(var d2=0; d2<dagen; d2++){ for(var u2=0; u2<uren; u2++){ var t=(mx>mn)?(grid[d2][u2]-mn)/(mx-mn):0.5; ctx.fillStyle=kleur(t); ctx.fillRect(d2*cw, u2*ch, Math.ceil(cw), Math.ceil(ch)); } }
  var lg=document.getElementById('fs-heat-legend');
  if(lg){ lg.innerHTML='<span>'+Math.round(mn)+' €/MWh</span>'; var bar=document.createElement('span'); bar.style.cssText='display:inline-block;width:160px;height:10px;border-radius:3px;background:linear-gradient(to right,rgb(30,90,200),rgb(255,255,40),rgb(255,55,0))'; lg.appendChild(bar); var hi=document.createElement('span'); hi.textContent=Math.round(mx)+' €/MWh'; lg.appendChild(hi); }
}
</script>
