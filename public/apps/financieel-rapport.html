<!DOCTYPE html>
<html lang="nl">
<head>

<title>Fluctus — Financieel rapport (ontwerpvoorstel)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --blauw:#1F3864; --blauw-l:#2d4f8e; --groen:#05B050; --groen-d:#048443;
    --oranje:#9E480E; --grijs:#5A6577; --lijn:#D5DBE3; --bg:#F5F7FA; --zwart:#1A1F2B;
    --rood:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--zwart);background:#e9edf2;font-size:14px;line-height:1.5}
  .a4{background:#fff;width:210mm;min-height:297mm;margin:14px auto;padding:16mm 18mm 12mm;box-shadow:0 2px 14px rgba(0,0,0,.12);display:flex;flex-direction:column}
  .a4 > .a4-content{flex:1}
  .a4-foot{margin-top:auto;padding-top:8px;font-size:9px;color:var(--grijs);border-top:1px solid var(--lijn);display:flex;justify-content:space-between}
  .eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grijs);font-weight:700}
  h1{font-size:34px;color:var(--blauw);line-height:1.1;margin:6px 0 10px;font-weight:800}
  h2{font-size:22px;color:var(--blauw);margin:0 0 4px;font-weight:800}
  h3{font-size:15px;color:var(--blauw);margin:16px 0 6px;font-weight:700}
  .lead{font-size:15px;color:var(--grijs);margin-bottom:14px}
  p{margin:8px 0}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
  .kpi{border:1px solid var(--lijn);border-left:4px solid var(--blauw);border-radius:4px;padding:12px}
  .kpi.groen{border-left-color:var(--groen)}
  .kpi.oranje{border-left-color:var(--oranje)}
  .kpi .l{font-size:10px;color:var(--grijs);text-transform:uppercase;letter-spacing:.05em}
  .kpi .v{font-size:24px;font-weight:800;color:var(--zwart);margin-top:3px}
  .kpi .s{font-size:10px;color:var(--grijs);margin-top:2px}
  table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
  th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--lijn)}
  th:first-child,td:first-child{text-align:left}
  thead th{background:var(--blauw);color:#fff;font-weight:700;border-bottom:none}
  tbody tr:nth-child(even){background:var(--bg)}
  tfoot td{font-weight:800;border-top:2px solid var(--blauw);background:#eef2f8}
  .pos{color:var(--groen-d);font-weight:700}
  .neg{color:var(--rood);font-weight:700}
  .box{border:1px solid var(--lijn);border-radius:6px;padding:14px;margin:12px 0;background:var(--bg)}
  .box.blauw{background:#1F386408;border-color:#1F386430}
  .box.groen{background:#05B0500f;border-color:#05B05040}
  .box.oranje{background:#FFF3E0;border-color:#9E480E55}
  .note{font-size:11px;color:var(--grijs);font-style:italic}
  .quote{font-size:20px;font-style:italic;color:var(--blauw);border-left:4px solid var(--groen);padding:10px 18px;margin:20px 0;line-height:1.4}
  .quote .bron{display:block;font-size:13px;font-style:normal;color:var(--grijs);margin-top:8px}
  ul.toc{list-style:none}
  ul.toc li{padding:6px 0;border-bottom:1px dotted var(--lijn);display:flex;justify-content:space-between;font-size:14px}
  ul.toc li .n{color:var(--blauw);font-weight:700;width:28px}
  ul.toc li .t{flex:1}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .hm-wrap{margin:10px 0}
  .hm-canvas{width:100%;height:150px;border:1px solid var(--lijn);border-radius:3px;image-rendering:pixelated}
  .hm-axis{display:flex;justify-content:space-between;font-size:9px;color:var(--grijs);margin-top:2px}
  .hm-legend{display:flex;align-items:center;gap:8px;justify-content:center;font-size:10px;color:var(--grijs);margin-top:6px}
  .hm-legend .bar{height:10px;width:180px;border-radius:2px}
  .chart-wrap{height:150px;margin:6px 0}
  table.compact{font-size:10px}
  table.compact td,table.compact th{padding:2.5px 5px}
  .maand-as{display:flex;justify-content:space-between;font-size:8px;color:var(--grijs);margin-top:2px}
  .tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;background:#E6EEF7;color:var(--blauw)}
  .tag.win{background:#05B05018;color:var(--groen-d)}
  /* factuur-kader (gedeeld met het factuurrapport): lichte bg, afgeronde kader, schaduw rechtsonder */
  .factuur-kader{background:#FAFBFD;border:1px solid var(--lijn);border-radius:10px;box-shadow:5px 6px 14px rgba(31,56,100,.10);margin:14px 0;overflow:hidden}
  .fk-titel{background:var(--blauw);color:#fff;padding:8px 16px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .fk-titel .badge{font-size:10px;background:#ffffff22;padding:2px 8px;border-radius:3px}
  .vgl-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .vgl-grid > div{padding:14px 16px}
  .vgl-grid > div:first-child{border-right:1px solid var(--lijn)}
  .vgl-kop{font-weight:800;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .vgl-kop .bedrag{font-size:16px;color:var(--blauw)}.vgl-kop.beter .bedrag{color:var(--groen-d)}
  table.vgl{width:100%;border-collapse:collapse;font-size:11.5px}
  table.vgl td{padding:4px 2px;border-bottom:1px solid #eceff4}table.vgl td:last-child{text-align:right}
  table.vgl .grp td{font-weight:700;color:var(--blauw);padding-top:8px}
  table.vgl .tot td{font-weight:800;border-top:2px solid var(--blauw);padding-top:6px}
  @page{size:A4;margin:0}
  @media print{
    body{background:#fff}
    .a4{box-shadow:none;margin:0;width:auto;min-height:297mm;page-break-after:always;break-after:page}
    .a4:last-child{page-break-after:auto;break-after:auto}
    table,.factuur-kader,.box,.chart-wrap{break-inside:avoid}
  }
  @media (max-width:800px){.a4{width:100%;padding:16px}.kpi-row{grid-template-columns:1fr 1fr}.split{grid-template-columns:1fr}.vgl-grid{grid-template-columns:1fr}.vgl-grid>div:first-child{border-right:none;border-bottom:1px solid var(--lijn)}}
</style>
</head>
<body>
<div id="rapport"></div>

<script>
// =============================================================================
//  FLUCTUS FINANCIEEL RAPPORT — generator
//  Voedt het rapport met de gegevens van TWEE scenario's (beter vs minder) uit
//  de simulator + een set aannames. Hier ingevuld met een UITGEWERKT VOORBEELD;
//  vervang het INVOER-blok door de echte simulator-uitvoer.
// =============================================================================

// ---------- AANNAMES (Johan, vaste prijzen in afwachting van offerte-modules) ----------
var AAN = {
  capex:      { pv_kwp:450, batterij_kwh:350, laadpaal_ac:2500, laadpaal_dc160:40000, laadpaal_dc400:70000 },
  onderhoud:  { pv_kwp:5,   batterij_kw:5,    laadpaal:50 },  // €/jaar
  omvormer_vervang_kwp:50,   // €/kWp, in jaar 10 (PV)
  verzekering_promille:3.4,  // ‰ van capex per jaar
  afschrijving:{ laadpalen_jaar:10, pv_jaar:25 },  // batterij = levensduur (uit sim)
  // Kostenevolutie-scenario's: inflatie op alle posten + extra op NETKOSTEN.
  scenarios:{
    conservatief:{ naam:'Conservatief', inflatie:0.02, net_extra:0.00, net_sprong_jaar:null, net_sprong:0 },
    realistisch: { naam:'Realistisch',  inflatie:0.02, net_extra:0.04, net_sprong_jaar:2029, net_sprong:0.30 },
    optimistisch:{ naam:'Optimistisch', inflatie:0.04, net_extra:0.05, net_sprong_jaar:2029, net_sprong:0.50 }
  },
  startjaar:2026,
  horizon:15
};

// ---------- INVOER: TWEE SCENARIO'S ----------
// Wordt gevoed door (1) de generator via window.FLUCTUS_RAPPORT_DATA, (2) de
// simulator-knop via sessionStorage 'FLUCTUS_RAPPORT', anders (3) het VOORBEELD.
function _rapportUitSessie(){ try{ return JSON.parse(sessionStorage.getItem('FLUCTUS_RAPPORT')||'null'); }catch(e){ return null; } }
var INV = window.FLUCTUS_RAPPORT_DATA || _rapportUitSessie() || {
  klant:'Voorbeeld NV', locatie:'9220 · Fluvius Midden-Vlaanderen · MS', datum:'juli 2026',
  profielen:null,   // {n, vermogen_aansluiting_kw[], kost_eur_mwh[], spot_prijs_eur_mwh[]} uit sim; null = synthetisch

  // ontwerp van het BETERE scenario (het voorstel)
  ontwerp:{
    pv_kwp:600, batterij_kw:300, batterij_kwh:600,
    laadpalen:{ ac:20, dc160:1, dc400:0 },
    batterij_cycli_jaar:500, batterij_max_cycli:8000,
    contract:'Dynamisch (spot passthrough)', sturing:'Variant 2 (volledig, excl. onbalans)'
  },

  // energetische kerncijfers (uit de simulatie van het BETERE scenario, jaarbasis)
  energie:{
    jaarverbruik_gebouw_mwh:164, laadplein_mwh:650,
    pv_productie_mwh:570, pv_zelfverbruik_mwh:348,   // zelfconsumptie = 61%
    pv_via_batterij_mwh:96, pv_naar_gebouw_mwh:210, pv_naar_laadplein_mwh:138,
    batterij_doorzet_mwh:300,
    aansluiting_kw:100, sitepiek_zonder_batterij_kw:241, sitepiek_met_batterij_kw:100,
    spot_afname_mwh:120, spot_injectie_mwh:60
  },

  // FACTUREN (jaarbasis, excl. btw)
  facturen:{
    afrekening_periode_mnd:1, afrekening_bedrag:13600,          // opgeladen afrekening (1 maand)
    bestaand_jaar:163200,                                        // extrapolatie afrekening → jaar
    scherp_dynamisch_jaar:151000,                               // scherp geprijsd dynamisch contract, zelfde verbruik
    // "minder scenario" (basis in de financiële vergelijking): ander contract/ontwerp
    minder_scenario_jaar:164000, minder_scenario_label:'Basis: dynamisch contract zonder PV/batterij, met laadplein → aansluiting verhoogd',
    // "beter scenario" (voorstel, variant 2)
    beter_scenario_jaar:74000, beter_scenario_label:'Voorstel: PV + batterij + laadplein, variant 2'
  },
  // factuurcomponenten voor de vergelijkingstabel (beter vs minder), jaar, excl. btw
  componenten:{
    energie:      { minder:110000, beter:22000 },
    distributie:  { minder:33000,  beter:26000 },
    waarvan_capaciteit:{ minder:16000, beter:11000 },
    heffingen:    { minder:21000,  beter:26000 }
  },

  // besparingen (jaar 1)
  besparing_jaar1: 90000,           // minder_scenario − beter_scenario (variant 2)
  besparing_energie_deel: 0.72,     // aandeel van de besparing dat 'energie' is (rest = net/capaciteit)
  onbalans_windfall_jaar1: 26000    // extra besparing door onbalanssturing (variant 3 − variant 2)
};

// ============================ REKENMOTOR ============================
var fmt = new Intl.NumberFormat('nl-BE',{maximumFractionDigits:0});
var fmt1 = new Intl.NumberFormat('nl-BE',{maximumFractionDigits:1});
function eur(v){ return '€ '+fmt.format(Math.round(v)); }
function eur1(v){ return '€ '+fmt1.format(v); }
function pct(v){ return fmt1.format(v)+' %'; }

// Capex uit het ontwerp
function berekenCapex(o){
  var pv = o.pv_kwp*AAN.capex.pv_kwp;
  var bat = o.batterij_kwh*AAN.capex.batterij_kwh;
  var lp = o.laadpalen.ac*AAN.capex.laadpaal_ac + o.laadpalen.dc160*AAN.capex.laadpaal_dc160 + o.laadpalen.dc400*AAN.capex.laadpaal_dc400;
  return { pv:pv, batterij:bat, laadpalen:lp, totaal:pv+bat+lp,
    aantal_laadpalen:o.laadpalen.ac+o.laadpalen.dc160+o.laadpalen.dc400 };
}
// Onderhoud jaar 1
function onderhoudJaar1(o){
  return o.pv_kwp*AAN.onderhoud.pv_kwp + o.batterij_kw*AAN.onderhoud.batterij_kw +
         (o.laadpalen.ac+o.laadpalen.dc160+o.laadpalen.dc400)*AAN.onderhoud.laadpaal;
}
// Batterij-levensduur (jaar) uit cycli
function batterijLevensduur(o){
  var lv = o.batterij_cycli_jaar>0 ? Math.round(o.batterij_max_cycli/o.batterij_cycli_jaar) : 15;
  return Math.max(8, Math.min(20, lv));
}

// Groeifactor voor 'energie'-posten en 'net'-posten per scenario, per jaar (0-based y)
function groeiEnergie(sc, y){ return Math.pow(1+sc.inflatie, y); }
function groeiNet(sc, y){
  var g = Math.pow(1+sc.inflatie+sc.net_extra, y);
  if(sc.net_sprong_jaar){
    var jr = AAN.startjaar + y;
    if(jr >= sc.net_sprong_jaar) g *= (1+sc.net_sprong);
  }
  return g;
}

// Besparing per jaar y (0-based) onder scenario sc: energie-deel groeit met inflatie,
// net-deel met net-groei. Basisbesparing = INV.besparing_jaar1.
function besparingJaar(sc, y, basis){
  basis = basis===undefined ? INV.besparing_jaar1 : basis;
  var e = basis*INV.besparing_energie_deel*groeiEnergie(sc,y);
  var n = basis*(1-INV.besparing_energie_deel)*groeiNet(sc,y);
  return e+n;
}
// Opex per jaar y onder scenario sc (onderhoud groeit met inflatie; verzekering vast op capex)
function opexJaar(sc, y, oh1, verzekering){
  return oh1*Math.pow(1+sc.inflatie, y) + verzekering;
}

var CAPEX = berekenCapex(INV.ontwerp);
var OH1 = onderhoudJaar1(INV.ontwerp);
var VERZ = CAPEX.totaal*AAN.verzekering_promille/1000;
var BAT_LV = batterijLevensduur(INV.ontwerp);

// Afschrijving per jaar (lineair) — voor de P&L
function afschrijvingJaar(y){
  var a=0;
  a += CAPEX.pv/AAN.afschrijving.pv_jaar;                      // PV 25j
  if(y < AAN.afschrijving.laadpalen_jaar) a += CAPEX.laadpalen/AAN.afschrijving.laadpalen_jaar; // laadpalen 10j
  a += CAPEX.batterij/BAT_LV;                                   // batterij levensduur
  return a;
}

// Operationeel rendement + terugverdientijd voor de 3 scenario's (op basis van netto besparing − opex)
function opRendement(scKey, extraBesparing){
  var sc = AAN.scenarios[scKey];
  var cum=0, tvt=null;
  var netto1 = besparingJaar(sc,0, INV.besparing_jaar1+(extraBesparing||0)) - opexJaar(sc,0,OH1,VERZ);
  for(var y=0;y<AAN.horizon;y++){
    var netto = besparingJaar(sc,y, INV.besparing_jaar1+(extraBesparing||0)) - opexJaar(sc,y,OH1,VERZ);
    if(y===9) netto -= INV.ontwerp.pv_kwp*AAN.omvormer_vervang_kwp; // omvormer-vervanging jaar 10
    cum += netto;
    if(tvt===null && cum>=CAPEX.totaal) tvt = y + (1-(cum-CAPEX.totaal)/netto);
  }
  return { rendement: netto1/CAPEX.totaal*100, tvt: tvt, netto1:netto1 };
}

// ---------- Annuïteit (gelijke debt service) ----------
function annuiteit(hoofdsom, rente, jaren){
  if(rente===0) return hoofdsom/jaren;
  return hoofdsom*rente/(1-Math.pow(1+rente,-jaren));
}

// ---------- Bouw een 15-jaar P&L-reeks voor een partij ----------
// rows: array van {jaar, inkomsten, kosten, fin, afschr, aflossing, cashflow, cumm, dscr}
function bouwReeks(cfg){
  // cfg: { scKey, extraBesparing, initieel (cashflow jaar 0), inkomstenFn(y,sc), kostenFn(y,sc),
  //        finFn(y), aflossingFn(y), afschrFn(y), dscrFn(y,inkomsten,kosten,ds) }
  var sc = AAN.scenarios[cfg.scKey];
  var rows=[]; var cumm = cfg.initieel||0;
  rows.push({jaar:AAN.startjaar-1, label:'Jaar 0', inkomsten:0, kosten:0, fin:0, afschr:0, aflossing:0,
             cashflow:cfg.initieel||0, cumm:cumm, dscr:null, isNul:true});
  for(var y=0;y<AAN.horizon;y++){
    var inkomsten = cfg.inkomstenFn(y,sc);
    var kosten = cfg.kostenFn ? cfg.kostenFn(y,sc) : 0;
    var fin = cfg.finFn ? cfg.finFn(y) : 0;
    var afschr = cfg.afschrFn ? cfg.afschrFn(y) : 0;
    var afl = cfg.aflossingFn ? cfg.aflossingFn(y) : 0;
    var cashflow = inkomsten - kosten - fin - afl;
    if(cfg.extraKostFn) cashflow -= cfg.extraKostFn(y);
    cumm += cashflow;
    var ds = fin+afl;
    var dscr = (cfg.dscrFn) ? cfg.dscrFn(y,inkomsten,kosten,ds) : (ds>0 ? (inkomsten-kosten)/ds : null);
    rows.push({jaar:AAN.startjaar+y, label:''+(y+1), inkomsten:inkomsten, kosten:kosten, fin:fin,
               afschr:afschr, aflossing:afl, cashflow:cashflow, cumm:cumm, dscr:dscr});
  }
  return rows;
}

// ============================ HEATMAPS ============================
// Teken een 365×96 heatmap op canvas. dataFn(dag,kw) → waarde. kleurSchaal(min,max).
function tekenHeatmap(canvas, dataFn, min, max, kleurFn){
  var W=365, H=96;
  canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');
  var img=ctx.createImageData(W,H);
  for(var d=0; d<W; d++){
    for(var q=0; q<H; q++){
      var v=dataFn(d,q);
      var c=kleurFn(v,min,max);
      var idx=(q*W+d)*4;
      img.data[idx]=c[0]; img.data[idx+1]=c[1]; img.data[idx+2]=c[2]; img.data[idx+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}
// blauw→wit→rood kleurschaal (zoals het temperatuur-voorbeeld)
function kleurBWR(v,min,max){
  var t=(v-min)/(max-min||1); t=Math.max(0,Math.min(1,t));
  if(t<0.5){ var u=t/0.5; return [Math.round(49+(255-49)*u),Math.round(130+(255-130)*u),Math.round(189+(255-189)*u)]; }
  var u=(t-0.5)/0.5; return [Math.round(255-(255-215)*u),Math.round(255-(255-48)*u),Math.round(255-(255-31)*u)];
}
// wit→groen (voor spotmarkt-energie) en wit→oranje (prijs)
function kleurGroen(v,min,max){ var t=(v-min)/(max-min||1);t=Math.max(0,Math.min(1,t));return [Math.round(255-(255-5)*t),Math.round(255-(255-176)*t),Math.round(255-(255-80)*t)];}

// Heatmap-data: gebruik de ECHTE per-kwartier-arrays uit de simulator
// (INV.profielen) als die er zijn; anders synthetische maar realistische profielen.
function _prof(arr, d, q){ if(!arr) return null; var i=d*96+q; return i<arr.length ? arr[i] : null; }
function seed(d,q){ return Math.sin(d*0.7+q*0.13)*0.5+0.5; }
function vermogenData(d,q){
  var v=_prof(INV.profielen&&INV.profielen.vermogen_aansluiting_kw, d, q); if(v!=null) return v;
  var u=q/4; var wd=(d%7)<5;
  var base = 30 + 20*Math.exp(-Math.pow(u-10,2)/8) + 18*Math.exp(-Math.pow(u-15,2)/8);
  var ev = ((u>=18)||(u<8)) ? 45*(wd?1:0.3) : 0;
  var pv = (u>6&&u<18)? -35*Math.sin((u-6)/12*Math.PI)*(0.6+0.4*Math.cos((d-172)/365*2*Math.PI)) : 0;
  return Math.max(0, base+ev+pv) + seed(d,q)*6;
}
function kostData(d,q){
  var v=_prof(INV.profielen&&INV.profielen.kost_eur_mwh, d, q); if(v!=null) return v;
  var u=q/4;
  return 70 + 55*Math.exp(-Math.pow(u-19,2)/5) - 80*Math.exp(-Math.pow(u-13,2)/6) + seed(d,q)*20;
}
function spotEnergieData(d,q){
  var v=_prof(INV.profielen&&INV.profielen.vermogen_aansluiting_kw, d, q); if(v!=null) return v*0.25;
  var u=q/4;
  return (u>10&&u<15? -1: (u>17&&u<22?1:0)) * (20+seed(d,q)*30);
}
function spotPrijsData(d,q){
  var v=_prof(INV.profielen&&INV.profielen.spot_prijs_eur_mwh, d, q); if(v!=null) return v;
  return kostData(d,q);
}

// ============================ RENDER ============================
var R = document.getElementById('rapport');
function el(tag, attrs, html){ var e=document.createElement(tag); if(attrs)for(var k in attrs){ if(k==='class')e.className=attrs[k]; else e.setAttribute(k,attrs[k]); } if(html!=null)e.innerHTML=html; return e; }
function pagina(nr, inner){
  var p=el('div',{class:'a4'});
  p.innerHTML = inner + '<div class="a4-foot"><span>Fluctus.net CVSO · BE 0757.494.180 · Onafhankelijk energieadvies — verkoopt geen energie of installaties</span><span>p. '+nr+'</span></div>';
  R.appendChild(p);
  return p;
}

// ---- Berekende kerncijfers ----
var e=INV.energie;
var zelfcons_pct = e.pv_productie_mwh>0 ? e.pv_zelfverbruik_mwh/e.pv_productie_mwh*100 : 0;

  </table>
  <div class="box groen"><b>Resultaat: ${eur(INV.besparing_jaar1)} goedkoper per jaar</b> — een daling van ${pct(besp_pct)} (excl. btw, B2B). De besparing komt uit eigen PV-verbruik, goedkopere energie via de batterij, én lagere maandpiek/capaciteitskost.</div>
  <h3>Waarom de kost per MWh daalt</h3>
  <p>Uitgedrukt per eenheid daalt uw energiekost van <b>${eur1(kostpermwh_minder)}/MWh</b> naar <b>${eur1(kostpermwh_beter)}/MWh</b>. Drie redenen werken samen: (1) een groot deel van uw verbruik wordt gedekt door eigen zon; (2) de batterij koopt de rest op de goedkoopste spot-momenten; en (3) diezelfde batterij verlaagt uw maandpiek, waardoor ook het capaciteitstarief zakt.</p>
`);

// ==================== PAGINA 10 — KOSTENSCENARIO'S + CAPEX + P&L ====================
function capexRow(lbl, aantal, bedrag){ return `<tr><td>${lbl}</td><td>${aantal}</td><td>${eur(bedrag)}</td></tr>`; }
// operationele P&L jaar 1 (realistisch)
var scR = AAN.scenarios.realistisch;
var opexR1 = opexJaar(scR,0,OH1,VERZ);
pagina(10, `
  <div class="eyebrow">Investering & kostenscenario's</div>
  <h2>Wat kost het, en hoe evolueren de kosten?</h2>
  <p class="lead">Vaste, transparante eenheidsprijzen (in afwachting van de bindende offertes) en drie scenario's voor de toekomst.</p>
  <h3>Investering (capex, indicatief, excl. btw)</h3>
  <table>
    <thead><tr><th>Post</th><th>Basis</th><th>Bedrag</th></tr></thead>
    <tbody>
      ${capexRow('PV-installatie', INV.ontwerp.pv_kwp+' kWp × €'+AAN.capex.pv_kwp, CAPEX.pv)}
      ${capexRow('Batterij (BESS)', INV.ontwerp.batterij_kwh+' kWh × €'+AAN.capex.batterij_kwh, CAPEX.batterij)}
      ${capexRow('Laadpalen AC', INV.ontwerp.laadpalen.ac+' × €'+AAN.capex.laadpaal_ac, INV.ontwerp.laadpalen.ac*AAN.capex.laadpaal_ac)}
      ${INV.ontwerp.laadpalen.dc160? capexRow('Laadpaal DC 160 kVA', INV.ontwerp.laadpalen.dc160+' × €'+AAN.capex.laadpaal_dc160, INV.ontwerp.laadpalen.dc160*AAN.capex.laadpaal_dc160):''}
    </tbody>
    <tfoot><tr><td>Totale investering</td><td></td><td>${eur(CAPEX.totaal)}</td></tr></tfoot>
  </table>
  <h3>Operationele kosten (jaar 1)</h3>
  <table>
    <tbody>
      <tr><td>Onderhoud PV (${INV.ontwerp.pv_kwp} kWp × €${AAN.onderhoud.pv_kwp})</td><td>${eur(INV.ontwerp.pv_kwp*AAN.onderhoud.pv_kwp)}</td></tr>
      <tr><td>Onderhoud batterij (${INV.ontwerp.batterij_kw} kW × €${AAN.onderhoud.batterij_kw})</td><td>${eur(INV.ontwerp.batterij_kw*AAN.onderhoud.batterij_kw)}</td></tr>
      <tr><td>Onderhoud laadpalen (${CAPEX.aantal_laadpalen} × €${AAN.onderhoud.laadpaal})</td><td>${eur(CAPEX.aantal_laadpalen*AAN.onderhoud.laadpaal)}</td></tr>
      <tr><td>Verzekering (${fmt1.format(AAN.verzekering_promille)}‰ van capex)</td><td>${eur(VERZ)}</td></tr>
    </tbody>
    <tfoot><tr><td>Totaal opex jaar 1</td><td>${eur(opexR1)}</td></tr></tfoot>
  </table>
  <h3>Drie kostenscenario's</h3>
  <table>
    <thead><tr><th>Scenario</th><th>Inflatie (alle posten)</th><th>Netkosten extra</th><th>Sprong 2029</th></tr></thead>
    <tbody>
      <tr><td>Conservatief</td><td>2 %</td><td>—</td><td>—</td></tr>
      <tr><td>Realistisch</td><td>2 %</td><td>+4 %/jaar</td><td>+30 % éénmalig</td></tr>
      <tr><td>Optimistisch</td><td>4 %</td><td>+5 %/jaar</td><td>+50 % éénmalig</td></tr>
    </tbody>
  </table>
  <p class="note">"Optimistisch" = optimistisch voor het ontwerp: hogere energie- en netkosten maken de vermeden kost (uw besparing) net gróter. De batterij-levensduur is hier ${BAT_LV} jaar (uit ${INV.ontwerp.batterij_cycli_jaar} cycli/jaar).</p>
`);

// ==================== PAGINA 11 — RENDEMENT + WINDFALL ====================
var rC=opRendement('conservatief'), rR=opRendement('realistisch'), rO=opRendement('optimistisch');
var rCw=opRendement('conservatief',INV.onbalans_windfall_jaar1), rRw=opRendement('realistisch',INV.onbalans_windfall_jaar1), rOw=opRendement('optimistisch',INV.onbalans_windfall_jaar1);
pagina(11, `
  <div class="eyebrow">Rendement</div>
  <h2>Rendement & terugverdientijd</h2>
  <p class="lead">Het operationele rendement op de investering en de terugverdientijd, voor elk kostenscenario (sturing variant 2).</p>
  <table>
    <thead><tr><th>Scenario</th><th>Netto besparing jaar 1</th><th>Operationeel rendement</th><th>Terugverdientijd</th></tr></thead>
    <tbody>
      <tr><td>Conservatief</td><td>${eur(rC.netto1)}</td><td>${pct(rC.rendement)}</td><td>${fmt1.format(rC.tvt)} jaar</td></tr>
      <tr><td>Realistisch</td><td>${eur(rR.netto1)}</td><td>${pct(rR.rendement)}</td><td>${fmt1.format(rR.tvt)} jaar</td></tr>
      <tr><td>Optimistisch</td><td>${eur(rO.netto1)}</td><td>${pct(rO.rendement)}</td><td>${fmt1.format(rO.tvt)} jaar</td></tr>
    </tbody>
  </table>
  <div class="box oranje">
    <h3 style="margin-top:0">Met de onbalans-windfall erbij</h3>
    <p>Wanneer we dezelfde berekening maken <b>inclusief de opbrengst van onbalanssturing</b> (~${eur(INV.onbalans_windfall_jaar1)}/jaar extra), stijgt het rendement en daalt de terugverdientijd:</p>
    <table>
      <thead><tr><th>Scenario</th><th>Rendement (met windfall)</th><th>Terugverdientijd</th></tr></thead>
      <tbody>
        <tr><td>Conservatief</td><td class="pos">${pct(rCw.rendement)}</td><td>${fmt1.format(rCw.tvt)} jaar</td></tr>
        <tr><td>Realistisch</td><td class="pos">${pct(rRw.rendement)}</td><td>${fmt1.format(rRw.tvt)} jaar</td></tr>
        <tr><td>Optimistisch</td><td class="pos">${pct(rOw.rendement)}</td><td>${fmt1.format(rOw.tvt)} jaar</td></tr>
      </tbody>
    </table>
    <p>Concreet: het rendement kan stijgen tot <b>${pct(rRw.rendement)}</b> en de terugverdientijd dalen tot <b>${fmt1.format(rRw.tvt)} jaar</b> (realistisch scenario).</p>
  </div>
  <p><b>Belangrijk — neem dit louter als informatie mee.</b> De sturing zal deze waarde oogsten wanneer ze beschikbaar is, maar reken er niet op als basis. Bovendien zullen deze onbalans-opbrengsten afnemen naarmate deze infrastructuur méér wordt ingezet om netcongestie en congestiekosten te voorkomen — wat op dat moment wellicht een nóg grotere waarde zal blijken. Het verleden kan de toekomst niet voorspellen; zie dit vooral als een inzicht waarmee u zich kunt voorbereiden op wat komt.</p>
`);

// ==================== PAGINA 12+ — FINANCIERINGSMODELLEN ====================
// Alle modellen op de REALISTISCHE P&L.
var scKey='realistisch';
var levensduurAfl = 10; // financierings-/lease-horizon
function besp(y){ return besparingJaar(AAN.scenarios[scKey], y, INV.besparing_jaar1); }
function opex(y){ return opexJaar(AAN.scenarios[scKey], y, OH1, VERZ); }
function omvormer(y){ return y===9 ? INV.ontwerp.pv_kwp*AAN.omvormer_vervang_kwp : 0; }

// laadsessie-inkomsten (voor concessie/lease-modellen) — indicatief
var laadsessie_omzet_jaar = INV.energie.laadplein_mwh*1000*0.07; // 7 €/100km ~ vereenvoudigd €/kWh
var laadsessie_kost_jaar = INV.energie.laadplein_mwh*1000*0.02;
var laadsessie_marge_jaar = laadsessie_omzet_jaar - laadsessie_kost_jaar;

// Model 1 — Koop zonder lening (enkel klant)
var m1 = bouwReeks({ scKey:scKey, initieel:-CAPEX.totaal,
  inkomstenFn:function(y){ return besp(y); },
  kostenFn:function(y){ return opex(y)+omvormer(y); },
  afschrFn:afschrijvingJaar });

// Model 2 — Koop met lening (klant), 25% eigen, 75% @5% over 10j
var eigen2 = CAPEX.totaal*0.25, lening2 = CAPEX.totaal*0.75;
var ds2 = annuiteit(lening2, 0.05, 10);
var saldo2 = lening2;
var rente2=[], afl2=[];
for(var y=0;y<AAN.horizon;y++){ if(y<10){ var r=saldo2*0.05; var a=ds2-r; rente2.push(r); afl2.push(a); saldo2-=a; } else { rente2.push(0); afl2.push(0); } }
var m2 = bouwReeks({ scKey:scKey, initieel:-eigen2,
  inkomstenFn:function(y){ return besp(y); },
  kostenFn:function(y){ return opex(y)+omvormer(y); },
  finFn:function(y){ return rente2[y]; }, aflossingFn:function(y){ return afl2[y]; },
  afschrFn:afschrijvingJaar,
  dscrFn:function(y,ink,kost,ds){ return ds>0 ? (ink-kost)/ds : null; } });

// Model 3 — Operationele lease (klant huurt; tegenpartij = lessor). 10% + onderhoud over 10j.
var leaseDS = annuiteit(CAPEX.totaal, 0.10, 10); // 10% return-annuïteit over capex, 10j
var m3_klant = bouwReeks({ scKey:scKey, initieel:0,
  inkomstenFn:function(y){ return besp(y); },
  kostenFn:function(y){ return (y<10? leaseDS + opex(y) : opex(y)) + omvormer(y); },
  dscrFn:function(y,ink,kost){ var ds=(y<10?leaseDS:0); return ds>0?(besp(y))/ds:null; } });
var m3_lessor = bouwReeks({ scKey:scKey, initieel:-CAPEX.totaal,
  inkomstenFn:function(y){ return y<10? leaseDS : 0; },
  kostenFn:function(y){ return 0; },
  dscrFn:function(){ return null; } });

// Model 4 — Concessie: concessiegever investeert; klant betaalt min. vergoeding (10% over 10j),
// daarna 50/50 revenue share op de laadsessie-marge. Twee tabellen.
var concDS = annuiteit(CAPEX.totaal, 0.10, 10);
var m4_klant = bouwReeks({ scKey:scKey, initieel:0,
  inkomstenFn:function(y){ return besp(y) + (y>=10? laadsessie_marge_jaar*0.5 : 0); },
  kostenFn:function(y){ return (y<10? concDS : 0) + opex(y) + omvormer(y); },
  dscrFn:function(y){ var ds=(y<10?concDS:0); return ds>0?besp(y)/ds:null; } });
var m4_conc = bouwReeks({ scKey:scKey, initieel:-CAPEX.totaal,
  inkomstenFn:function(y){ return (y<10? concDS : laadsessie_marge_jaar*0.5); },
  kostenFn:function(y){ return 0; },
  dscrFn:function(){ return null; } });

// Model 5 — Sale & lease back: klant verkoopt (ontvangt capex), huurt terug @10% 10j,
// revenue share 50/50 vanaf dag 1 gedurende 15j. Twee tabellen (klant + koper/partij).
var slbDS = annuiteit(CAPEX.totaal, 0.10, 10);
var m5_klant = bouwReeks({ scKey:scKey, initieel:+CAPEX.totaal,
  inkomstenFn:function(y){ return besp(y) + laadsessie_marge_jaar*0.5; },
  kostenFn:function(y){ return (y<10? slbDS : 0) + opex(y) + omvormer(y); },
  dscrFn:function(y){ var ds=(y<10?slbDS:0); return ds>0?(besp(y)+laadsessie_marge_jaar*0.5)/ds:null; } });
var m5_partij = bouwReeks({ scKey:scKey, initieel:-CAPEX.totaal,
  inkomstenFn:function(y){ return (y<10? slbDS : 0) + laadsessie_marge_jaar*0.5; },
  kostenFn:function(y){ return 0; },
  dscrFn:function(){ return null; } });

var MODELLEN = [
  { nr:1, titel:'Koop zonder lening', sub:'U koopt de installatie volledig met eigen middelen.', tabs:[{lbl:'Klant', rows:m1, eigen:CAPEX.totaal, dscr:false}] },
  { nr:2, titel:'Koop met lening', sub:'25% eigen middelen, 75% lening @5% over 10 jaar (gelijke debt service).', tabs:[{lbl:'Klant', rows:m2, eigen:eigen2, dscr:true}] },
  { nr:3, titel:'Operationele lease', sub:'U huurt de installatie (10% + onderhoud over 10 jaar). Geen eigen inbreng.', tabs:[{lbl:'Klant', rows:m3_klant, eigen:0, dscr:true},{lbl:'Lessor (tegenpartij)', rows:m3_lessor, eigen:CAPEX.totaal, dscr:false}] },
  { nr:4, titel:'Concessie', sub:'Concessiegever investeert; u betaalt een minimale vergoeding (10% over 10 jaar), daarna revenue share 50/50.', tabs:[{lbl:'Klant', rows:m4_klant, eigen:0, dscr:true},{lbl:'Concessiegever', rows:m4_conc, eigen:CAPEX.totaal, dscr:false}] },
  { nr:5, titel:'Sale & lease back', sub:'U verkoopt de installatie en huurt ze terug (10% over 10 jaar). Revenue share 50/50 vanaf dag 1, 15 jaar.', tabs:[{lbl:'Klant', rows:m5_klant, eigen:0, dscr:true},{lbl:'Koper/exploitant', rows:m5_partij, eigen:CAPEX.totaal, dscr:false}] }
];

function reeksTabel(rows, toonDscr){
  var head = `<thead><tr><th>Jaar</th><th>Inkomsten</th><th>Kosten</th><th>Fin. kost</th><th>Afschr.</th><th>Aflossing</th><th>Cashflow</th><th>Cumm.</th>${toonDscr?'<th>DSCR</th>':''}</tr></thead>`;
  var body='';
  rows.forEach(function(r){
    if(r.isNul){ body+=`<tr style="background:#eef2f8"><td>0</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td class="neg">${eur(r.cashflow)}</td><td class="neg">${eur(r.cumm)}</td>${toonDscr?'<td>—</td>':''}</tr>`; return; }
    body+=`<tr><td>${r.jaar}</td><td>${eur(r.inkomsten)}</td><td>${eur(r.kosten)}</td><td>${r.fin?eur(r.fin):'—'}</td><td>${eur(r.afschr)}</td><td>${r.aflossing?eur(r.aflossing):'—'}</td><td class="${r.cashflow>=0?'pos':'neg'}">${eur(r.cashflow)}</td><td class="${r.cumm>=0?'pos':'neg'}">${eur(r.cumm)}</td>${toonDscr?'<td>'+(r.dscr!=null?fmt1.format(r.dscr):'—')+'</td>':''}</tr>`;
  });
  return `<table class="compact">${head}<tbody>${body}</tbody></table>`;
}
function rendementEigen(rows, eigen){
  var eind = rows[rows.length-1].cumm;
  var som = 0; rows.forEach(function(r){ if(!r.isNul) som+=r.cashflow; });
  var jaren = AAN.horizon;
  var gemJaar = som/jaren;
  var rend = eigen>0 ? gemJaar/eigen*100 : null;
  return { eindCumm:eind, gemJaar:gemJaar, rend:rend };
}

MODELLEN.forEach(function(mod, mi){
  var paginaNr = 12+mi;
  var inner = `<div class="eyebrow">Financieringsmodel ${mod.nr} / 5</div><h2>${mod.nr}. ${mod.titel}</h2><p class="lead">${mod.sub} — realistische P&amp;L, ${AAN.horizon} jaar.</p>`;
  mod.tabs.forEach(function(tab, ti){
    var re = rendementEigen(tab.rows, tab.eigen);
    inner += `<h3>${tab.lbl}${tab.eigen>0? ' — eigen inbreng '+eur(tab.eigen):''}</h3>`;
    inner += reeksTabel(tab.rows, tab.dscr);
    inner += `<div class="box ${re.eindCumm>=0?'groen':'oranje'}" style="display:flex;gap:20px;flex-wrap:wrap">
      <div><span class="eyebrow">Cumm. cashflow einde jaar 15</span><br><b style="font-size:18px">${eur(re.eindCumm)}</b></div>
      ${tab.eigen>0? `<div><span class="eyebrow">Rendement op eigen inbreng</span><br><b style="font-size:18px">${re.rend!=null?pct(re.rend):'—'}</b></div>`:''}
      <div style="flex:1;min-width:200px"><div class="chart-wrap"><canvas id="chart-m${mod.nr}-${ti}"></canvas></div></div>
    </div>`;
    charts.push({id:'chart-m'+mod.nr+'-'+ti, rows:tab.rows, label:mod.titel+' — '+tab.lbl});
  });
  if(mi===MODELLEN.length-1){
    inner += `<div class="box"><p class="note"><b>Aannames financieringsmodellen (te verfijnen met de definitieve offertes):</b> lease/concessie/sale-leaseback gerekend op een annuïteit die de tegenpartij een rendement van 10% geeft over de capex, 10 jaar. Revenue share = 50/50 op de netto laadsessie-marge (indicatief: ${eur(laadsessie_marge_jaar)}/jaar). DSCR = (netto besparing) / debt service. Belastingen buiten beschouwing. Alle bedragen excl. btw.</p></div>`;
  }
  pagina(paginaNr, inner);
});

// ============================ NA RENDER: canvas + charts ============================
function legendGradient(id, kleurFn, min, max){
  var d=document.getElementById(id); if(!d)return;
  var stops=[]; for(var i=0;i<=10;i++){ var c=kleurFn(min+(max-min)*i/10,min,max); stops.push('rgb('+c[0]+','+c[1]+','+c[2]+') '+(i*10)+'%'); }
  d.style.background='linear-gradient(90deg,'+stops.join(',')+')';
}
setTimeout(function(){
  heatmaps.forEach(function(h){
    var cv=document.getElementById(h.id); if(cv){ tekenHeatmap(cv, h.fn, h.min, h.max, h.kleur); }
    legendGradient(h.lg, h.kleur, h.min, h.max);
  });
  charts.forEach(function(ch){
    var cv=document.getElementById(ch.id); if(!cv)return;
    var labels=ch.rows.map(function(r){return r.isNul?'0':r.jaar;});
    var data=ch.rows.map(function(r){return Math.round(r.cumm);});
    new Chart(cv.getContext('2d'),{ type:'line',
      data:{ labels:labels, datasets:[{ label:'Cumm. cashflow', data:data, borderColor:'#1F3864', backgroundColor:'#1F386420', fill:true, tension:.15, pointRadius:2 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{ y:{ ticks:{ callback:function(v){return '€'+(v/1000).toFixed(0)+'k';}, font:{size:9} }, grid:{color:'#eee'} },
                 x:{ ticks:{font:{size:8}}, grid:{display:false} } } } });
  });
}, 60);
</script>
